{% extends 'base.html' %}

{% block background %}
<!-- Hide 3D background inside classroom for less distraction, or keep it very faint -->
<div class="fixed inset-0 z-0 bg-gray-900 pointer-events-none"></div>
{% endblock %}

{% block content %}
<div class="flex-grow flex flex-col p-4 sm:p-6 lg:p-8 h-[calc(100vh-4rem)] max-h-[calc(100vh-4rem)] relative z-10"
    id="classroom-app">
    <div
        class="max-w-4xl w-full mx-auto flex flex-col h-full bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 overflow-hidden shadow-2xl">

        <!-- Header -->
        <header class="p-4 border-b border-white/10 flex justify-between items-center bg-gray-900/50">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <span class="text-2xl">👩‍🏫</span> EduMorph AI Tutor
            </h2>
            <div class="flex items-center gap-4">
                <!-- Local Webcam Feed for MediaPipe -->
                <div class="relative w-24 h-16 bg-black rounded overflow-hidden border border-white/20">
                    <video id="webcam" class="w-full h-full object-cover transform scale-x-[-1]" autoplay playsinline muted></video>
                    <div id="focus-indicator" class="absolute bottom-1 right-1 w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.8)]" title="Focus Status"></div>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    Online
                </div>
            </div>
        </header>

        <!-- Chat History -->
        <div class="flex-grow overflow-y-auto p-4 space-y-4" id="chat-container">
                <div v-for="(msg, index) in chatHistory" :key="index" class="flex flex-col mb-4" :class="msg.role === 'user' ? 'items-end' : 'items-start'">
                    <!-- AI Message Container -->
                    <div v-if="msg.role !== 'user'" class="flex items-start gap-4 w-full">
                        <div class="flex-shrink-0 mt-1">
                            <span class="text-3xl bg-white/10 p-2 rounded-full border border-white/20 shadow-[0_0_15px_rgba(255,255,255,0.1)] block">🤖</span>
                        </div>
                        <div class="relative max-w-[85%] group">
                            <div class="glass-card rounded-2xl rounded-tl-sm p-4 text-gray-200 border-l-4 border-l-indigo-500 shadow-lg text-sm leading-relaxed whitespace-pre-wrap prose prose-invert"
                                v-html="formatMessage(msg.content)">
                            </div>
                            <!-- Star Button for AI messages -->
                            <button @click="starMessage(msg.content, index)" 
                                    class="absolute -right-10 top-2 p-2 rounded-full transition"
                                    :class="msg.starred 
                                        ? 'text-yellow-400 bg-white/10 shadow-[0_0_10px_rgba(250,204,21,0.6)]'
                                        : 'text-gray-500 hover:text-yellow-400 hover:bg-white/10 opacity-0 group-hover:opacity-100'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" :fill="msg.starred ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- User Message Bubble -->
                    <div v-else class="max-w-[75%] bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl rounded-tr-sm px-5 py-3 text-white shadow-lg text-sm leading-relaxed"
                        v-html="formatMessage(msg.content)">
                    </div>
                </div>

            <div v-if="loading" class="flex justify-start">
                <div class="chat-bubble-ai p-4 max-w-[80%] flex items-center gap-1">
                    <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></span>
                    <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                </div>
            </div>
        </div>

        <!-- Voice AI Tutor Floating Window -->
        <div v-if="voiceModeActive" class="fixed bottom-24 right-4 sm:right-8 w-72 bg-gray-900 border border-indigo-500/50 rounded-2xl shadow-2xl z-50 overflow-hidden flex flex-col transition-all duration-300">
            <div class="p-3 flex items-center justify-between bg-indigo-900/40 border-b border-indigo-500/30">
                <h3 class="text-sm font-bold text-white flex items-center gap-2">
                    <span class="animate-pulse">🎙️</span> Voice AI Tutor
                </h3>
                <button @click="closeVoiceMode" class="text-gray-400 hover:text-white transition-colors">
                    ✕
                </button>
            </div>
            
            <div class="p-6 flex flex-col items-center justify-center min-h-[160px] bg-gradient-to-b from-gray-900 to-black">
                <!-- Listening State -->
                <div v-if="voiceState === 'listening'" class="flex flex-col items-center">
                    <div class="relative w-16 h-16 flex items-center justify-center rounded-full bg-red-500/20 text-red-500 mb-3">
                        <span class="absolute inset-0 rounded-full border border-red-500 animate-ping opacity-75"></span>
                        <svg class="w-8 h-8 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </div>
                    <p class="text-xs text-red-400 font-semibold animate-pulse">Listening...</p>
                </div>
                
                <!-- Processing State -->
                <div v-if="voiceState === 'processing'" class="flex flex-col items-center">
                    <div class="flex items-center gap-1 mb-3 h-16">
                        <span class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                        <span class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                    </div>
                    <p class="text-xs text-indigo-300 font-semibold animate-pulse">Thinking...</p>
                </div>
                
                <!-- Speaking State -->
                <div v-if="voiceState === 'speaking'" class="flex flex-col items-center">
                    <div class="flex items-center justify-between gap-1 w-16 h-16 mb-3">
                        <div class="w-2 bg-emerald-400 rounded-full h-8 animate-[pulse_1s_infinite]" style="animation-delay: 0s"></div>
                        <div class="w-2 bg-emerald-400 rounded-full h-16 animate-[pulse_1s_infinite]" style="animation-delay: 0.2s"></div>
                        <div class="w-2 bg-emerald-400 rounded-full h-12 animate-[pulse_1s_infinite]" style="animation-delay: 0.4s"></div>
                        <div class="w-2 bg-emerald-400 rounded-full h-10 animate-[pulse_1s_infinite]" style="animation-delay: 0.1s"></div>
                        <div class="w-2 bg-emerald-400 rounded-full h-14 animate-[pulse_1s_infinite]" style="animation-delay: 0.3s"></div>
                    </div>
                    <p class="text-xs text-emerald-300 font-semibold animate-pulse">Speaking...</p>
                </div>

                <!-- Idle/Muted State -->
                <div v-if="voiceState === 'idle'" class="flex flex-col items-center">
                    <div class="w-16 h-16 flex items-center justify-center rounded-full bg-gray-800 text-gray-500 mb-3 transition-colors" :class="{'opacity-50': voiceMuted}">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </div>
                    <p class="text-xs font-semibold" :class="voiceMuted ? 'text-red-400' : 'text-gray-400'">
                        [[ voiceMuted ? 'Microphone Muted' : 'Ready' ]]
                    </p>
                </div>
            </div>

            <div class="p-3 bg-gray-900 border-t border-white/10 flex items-center justify-center gap-6">
                <!-- Mute toggle -->
                <button type="button" @click.prevent="toggleVoiceMute" class="p-2 rounded-full hover:bg-white/10 transition-colors" :class="voiceMuted ? 'text-red-400 bg-red-400/10' : 'text-gray-300'" title="Toggle Mute">
                    <svg v-if="!voiceMuted" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    <svg v-else class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                </button>
                <!-- Stop toggle -->
                <button type="button" @click.prevent="stopVoiceAction" class="p-2 rounded-full text-gray-300 hover:text-white hover:bg-white/10 transition-colors" title="Stop Speaking/Listening">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                </button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t border-white/10 bg-gray-900/50 relative">
            <div v-if="listening"
                class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-red-500/20 text-red-200 border border-red-500/50 px-3 py-1 rounded-full text-xs animate-pulse flex items-center gap-2 shadow-lg backdrop-blur-sm">
                <div class="w-2 h-2 bg-red-500 text-red-500 rounded-full animate-ping"></div> Listening...
            </div>

            <form @submit.prevent="sendMessage" class="flex items-end gap-2">
                <!-- Voice Button -->
                <button type="button" @click="startVoiceMode"
                    class="p-3 sm:p-4 rounded-xl border transition-all flex-shrink-0 focus:outline-none"
                    :class="voiceModeActive ? 'bg-indigo-600 border-indigo-500 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)]' : 'bg-gray-800 border-gray-700 text-gray-400 hover:text-white hover:bg-gray-700'">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                        </path>
                    </svg>
                </button>

                <!-- Text Input -->
                <div class="relative flex-grow">
                    <textarea v-model="userInput" @keydown.enter.prevent="sendMessage" rows="1"
                        placeholder="Ask a question..."
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 sm:py-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none overflow-hidden max-h-32"
                        style="min-height: 50px;"></textarea>
                </div>

                <!-- Send Button -->
                <button type="submit" :disabled="!userInput.trim() || loading"
                    class="p-3 sm:p-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white border border-transparent transition-all flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<!-- MediaPipe Face Detection CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', filename='js/app_classroom.js') }}"></script>
{% endblock %}
