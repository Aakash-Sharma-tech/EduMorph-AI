{% extends 'base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-4 relative z-10" id="auth-app">
    <div class="w-full max-w-md glass-card rounded-2xl p-8 relative overflow-hidden">

        <!-- Toggle Headers -->
        <div class="flex justify-center mb-8 relative z-10">
            <button @click="isLogin = true"
                :class="{'text-white border-b-2 border-indigo-500': isLogin, 'text-gray-400': !isLogin}"
                class="pb-2 px-4 text-lg font-medium transition">Login</button>
            <button @click="isLogin = false"
                :class="{'text-white border-b-2 border-indigo-500': !isLogin, 'text-gray-400': isLogin}"
                class="pb-2 px-4 text-lg font-medium transition">Sign Up</button>
        </div>

        <div v-if="error" class="mb-4 bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-md text-sm">
            [[ error ]]
        </div>

        <form @submit.prevent="submitForm" class="space-y-6 relative z-10">
            <div v-if="!isLogin">
                <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                <div class="mt-1">
                    <input v-model="form.username" id="username" type="text" :required="!isLogin"
                        class="appearance-none block w-full px-3 py-2 border border-white/10 rounded-md bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-300">Email address</label>
                <div class="mt-1">
                    <input v-model="form.email" id="email" type="email" required
                        class="appearance-none block w-full px-3 py-2 border border-white/10 rounded-md bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                <div class="mt-1">
                    <input v-model="form.password" id="password" type="password" required
                        class="appearance-none block w-full px-3 py-2 border border-white/10 rounded-md bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-gray-300">Account Type</label>
                <div class="mt-1">
                    <select v-model="form.role" id="role" class="block w-full px-3 py-2 border border-white/10 rounded-md bg-gray-800 text-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
            </div>

            <div>
                <button type="submit" :disabled="loading"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-gray-900 transition disabled:opacity-50">
                    <span v-if="loading">Processing...</span>
                    <span v-else>[[ isLogin ? 'Sign In' : 'Sign Up' ]]</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/app_auth.js') }}"></script>
{% endblock %}
